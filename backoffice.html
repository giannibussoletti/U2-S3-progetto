<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BACKOFFICE</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="d-flex flex-column vh-100">
    <header>
      <!-- NAVBAR -->
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="./home.html"
            ><img
              src="https://store.fastly.steamstatic.com/public/shared/images/header/logo_steam.svg?t=962016"
              alt="logo_steam"
              style="height: 30px"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav text-uppercase">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="./home.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./backoffice.html">Back Office</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <!-- NAVBAR -->
      <h1 class="text-center text-uppercase fw-bold my-3">admin</h1>
    </header>
    <main class="flex-grow-1">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-6">
            <form>
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" />
              </div>
              <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <input type="textarea" class="form-control" id="description" />
              </div>
              <div class="mb-3">
                <label for="brand" class="form-label">Software House</label>
                <input type="text" class="form-control" id="brand" />
              </div>
              <div class="mb-3">
                <label for="imageUrl" class="form-label">Thumbnail</label>
                <input type="text" class="form-control" id="imageUrl" />
              </div>
              <div class="mb-3">
                <label for="price" class="form-label">Price</label>
                <input type="number" class="form-control" id="price" />
              </div>
              <div class="d-flex justify-content-between">
                <button id="invia-form" type="submit" class="btn btn-success">Invia</button>
                <button id="cancella-gioco" type="submit" class="btn btn-danger">Cancella</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div class="container-fluid">
        <div class="row">
          <div class="col text-center bg-black p-3 mt-5">
            <p class="m-0">All Rights Reserverd Steam</p>
          </div>
        </div>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="./backoffice.js"></script>
  </body>
</html>
